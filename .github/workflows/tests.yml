name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/pappadf/granny-smith-dev:ubuntu24-emsdk4.0.10-node22
      # Optionally, after a build you can pin by digest instead for immutability:
      # image: ghcr.io/pappadf/granny-smith-dev@sha256:<digest-here>
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # NOTE: GS_TEST_DATA_TOKEN is scoped to the single step that needs it
    # (see "Fetch test data" below) to minimize exposure to other steps/actions.
    # Secrets are not available to fork PRs, so external PRs see an empty value.

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Install p7zip (needed to extract large binary archives like CD-ROM images)
      - name: Install p7zip
        run: |
          if ! command -v 7z >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq p7zip-full
          fi

      # m68k binutils assembles the generic declaration-ROM fragments
      # (tools/vrom / src/core/peripherals/nubus/vrom68k).  The devcontainer
      # image ships it; this step covers image versions that predate it.
      - name: Install m68k binutils
        run: |
          if ! command -v m68k-linux-gnu-as >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq binutils-m68k-linux-gnu
          fi

      # Fetch proprietary test data (only works for internal builds with token access)
      - name: Fetch test data
        id: fetch-data
        run: |
          if [ -n "$GS_TEST_DATA_TOKEN" ]; then
            ./scripts/fetch-test-data.sh
            # Only mark test data as available once fetch actually succeeds,
            # otherwise gated steps below would run without data and fail confusingly.
            echo "has_test_data=true" >> $GITHUB_OUTPUT
          else
            echo "has_test_data=false" >> $GITHUB_OUTPUT
            echo "::notice::Test data not available (external contributor or missing secret)"
            echo "Skipping integration and e2e tests that require proprietary data."
          fi
        env:
          GS_TEST_DATA_TOKEN: ${{ secrets.GS_TEST_DATA_TOKEN }}

      - name: Verify emcc presence
        shell: bash
        run: |
          which emcc || { echo 'emcc not on PATH'; exit 1; }
          emcc -v | head -n 5

      - name: Show tool versions
        run: |
          node -v
          npm -v
          emcc -v | head -n 5
          g++ --version | head -n 1
          cmake --version | head -n 1
          ninja --version

      - name: Install dependencies (root)
        run: |
          if [ -f package-lock.json ]; then npm ci; fi

      - name: Build (clean)
        shell: bash
        run: |
          rm -rf build
          make

      - name: List build artifacts
        run: ls -l build || true

      # CPU unit tests can run without proprietary test data
      # (they use third-party/single-step-tests)
      - name: Run unit tests (CPU)
        run: |
          make -C tests/unit run

      # Integration and e2e tests require proprietary test data
      - name: Run integration tests
        if: steps.fetch-data.outputs.has_test_data == 'true'
        run: |
          make integration-test

      # NOTE: the browser end-to-end suite (Playwright) now runs in the `ui`
      # job against the web2 (Svelte) frontend — see `make ui2-e2e` there.
      # The legacy web UI's e2e (tests/e2e/specs/**) was retired with it.

      - name: Summary for builds without test data
        if: steps.fetch-data.outputs.has_test_data == 'false'
        run: |
          echo "## ⚠️ Limited Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This build ran with **limited test coverage** because proprietary test data is not available." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests that ran:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests (CPU instruction tests)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests that were skipped:**" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ Integration tests (require ROM and disk images)" >> $GITHUB_STEP_SUMMARY
          echo "- ⏭️ E2E Playwright tests (require ROM and disk images; run in the ui job)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For full test coverage, see [docs/TEST_DATA.md](../docs/TEST_DATA.md)." >> $GITHUB_STEP_SUMMARY

  # New Svelte UI at app/web2. Typecheck + lint + Vitest + Vite build, then
  # the WASM build and the browser end-to-end suites: prod-smoke (always) and
  # the functional web2 Playwright specs (gated on proprietary test data).
  # This is the sole home of browser e2e since the legacy web UI was retired.
  ui:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/pappadf/granny-smith-dev:ubuntu24-emsdk4.0.10-node22
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # `submodules: recursive` pulls the remaining submodules (e.g.
      # single-step-tests). Peeler is now in-tree under src/peeler, so the
      # WASM build no longer depends on a submodule checkout.
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # p7zip extracts the large binary archives (e.g. the A/UX HD) that the
      # functional web2 e2e specs boot from.
      - name: Install p7zip
        run: |
          if ! command -v 7z >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq p7zip-full
          fi

      # m68k binutils assembles the generic declaration-ROM fragments for
      # the WASM build (see the matching step in the test job above).
      - name: Install m68k binutils
        run: |
          if ! command -v m68k-linux-gnu-as >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y -qq binutils-m68k-linux-gnu
          fi

      # Fetch proprietary test data (internal builds with token access only).
      # Gates the functional web2 e2e below; the token is scoped to this step.
      - name: Fetch test data
        id: fetch-data
        run: |
          if [ -n "$GS_TEST_DATA_TOKEN" ]; then
            ./scripts/fetch-test-data.sh
            echo "has_test_data=true" >> $GITHUB_OUTPUT
          else
            echo "has_test_data=false" >> $GITHUB_OUTPUT
            echo "::notice::Test data not available — running prod-smoke only, skipping functional web2 e2e."
          fi
        env:
          GS_TEST_DATA_TOKEN: ${{ secrets.GS_TEST_DATA_TOKEN }}

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install (app/web2)
        working-directory: app/web2
        run: npm ci

      - name: svelte-check
        working-directory: app/web2
        run: npm run check

      - name: Lint + format check
        working-directory: app/web2
        run: npm run lint

      - name: Vitest
        working-directory: app/web2
        run: npm test

      - name: Vite build
        working-directory: app/web2
        run: npm run build

      # Cheap static check — catches origin-rooted URLs and missing
      # COI service worker before they 404 on a real subpath deploy.
      # Doesn't need WASM; runs against bare Vite output.
      - name: check-dist (static validation of app/web2/dist/)
        run: node scripts/check-dist.mjs

      # Full WASM build, then copy artifacts into dist/ so the
      # prod-smoke test below can actually bootstrap the bridge.
      - name: WASM build (for prod-smoke)
        run: make

      - name: ui2 (copy WASM into app/web2/dist/)
        run: make ui2

      - name: Install Playwright (tests/e2e)
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # End-to-end smoke: serves dist/ from a subpath WITHOUT
      # COOP/COEP headers, asserts the page reaches __gsReady and
      # crossOriginIsolated === true. This is the production env
      # GitHub Pages provides; `make run` masks it.
      - name: prod-smoke (Playwright)
        run: make ui2-prod-smoke

      # Functional web2 end-to-end suite (tests/e2e/web2-specs/**): config
      # dialog, checkpoint resume, display drop, URL boot, A/UX realtime boot,
      # video-mode shader baselines, Lisa/Xenix, filesystem tab. Needs the
      # proprietary ROMs/disks, so it's gated on the fetch above. `make
      # ui2-e2e`'s webServer rebuilds + serves app/web2/dist with COOP/COEP.
      - name: web2 e2e (Playwright)
        if: steps.fetch-data.outputs.has_test_data == 'true'
        env:
          CI: true
        run: make ui2-e2e

      - name: Upload UI build (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: app-web2-dist
          path: app/web2/dist
          if-no-files-found: ignore

      - name: Upload e2e traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web2-e2e-traces
          path: tests/e2e/test-results
          if-no-files-found: ignore
